zone:
  # The zone spawns within spawn-radius blocks of this origin point (in the default world).
  origin:
    x: 0
    z: 0

  # Maximum distance (blocks) from origin that the zone center can appear
  spawn-radius: 1500

  # Initial radius range (blocks). A random value is picked in this range each spawn
  initial-radius-min: 100.0
  initial-radius-max: 200.0

  # Zone collapses when radius shrinks to this value (blocks)
  min-radius: 15.0

  # Shrink interval range (seconds). How often the zone loses radius
  shrink-interval-min: 20
  shrink-interval-max: 45

  # Shrink amount range (blocks removed per tick)
  shrink-amount-min: 2.0
  shrink-amount-max: 5.0

  # Range (seconds) the zone lingers at minimum radius before fully collapsing.
  # A random value is picked in this range each cycle.
  collapse-delay-min: 20
  collapse-delay-max: 45

  # Time range (seconds) before the zone reopens after collapsing
  respawn-delay-min: 600
  respawn-delay-max: 1800

  # Open a zone automatically 10 seconds after the plugin loads
  auto-start: true

  # Absolute Y bounds for the zone. Players outside this height range are treated as
  # outside the zone even if they are within the horizontal radius.
  height-min: 20
  height-max: 200

tokens:
  # Tokens per reward tick at full zone size
  base-reward: 1

  # Tokens per reward tick at minimum zone size (scales linearly as zone shrinks)
  max-reward: 2

  # Token reward interval range (seconds). Starts at max when zone opens, decreases
  # linearly to min as the zone shrinks. Rewards become more frequent as danger increases.
  reward-interval-min: 60
  reward-interval-max: 180

  # Flat token bonus given to every player inside the zone when it collapses.
  zone-close-reward: 3

mobs:
  # Mobs spawned per cycle when nobody is inside the zone.
  # Scales down as players enter; at player-capacity it drops to ~1 per cycle.
  base-spawn-count-min: 8
  base-spawn-count-max: 12

  # Mobs spawned per cycle multiplier per phase. Earlier phases are larger so they
  # need higher values to keep the zone feeling populated.
  phase-multiplier-awakening: 7.0
  phase-multiplier-intensifying: 2.5
  phase-multiplier-critical: 1.5
  phase-multiplier-collapse: 1.0

  # The zone is considered "at capacity" at this many players. Mob spawns near-minimal.
  player-capacity: 20

  # Hard cap on simultaneous zone mobs (randomised per zone open)
  max-total-min: 160
  max-total-max: 240

  # Spawn interval range (seconds) — a random value is chosen when the zone opens
  spawn-interval-min: 8
  spawn-interval-max: 15

  # Max simultaneous Withers allowed in the zone during Collapse phase
  max-withers: 3

environment:
  # How often the fire/explosion tick runs (ticks, 20 ticks = 1 second)
  fire-interval-min: 200
  fire-interval-max: 400

  # Fire blocks placed per tick, by phase (random value picked in range each tick)
  fire-awakening-min: 1
  fire-awakening-max: 3
  fire-intensifying-min: 3
  fire-intensifying-max: 7
  fire-critical-min: 7
  fire-critical-max: 12
  fire-collapse-min: 10
  fire-collapse-max: 18

  # Explosions per fire-tick, by phase (random value picked in range each tick)
  explosions-awakening-min: 0
  explosions-awakening-max: 1
  explosions-intensifying-min: 0
  explosions-intensifying-max: 2
  explosions-critical-min: 1
  explosions-critical-max: 3
  explosions-collapse-min: 1
  explosions-collapse-max: 3

  # Power range for regular tick explosions (random per explosion)
  explosion-power-min: 1.5
  explosion-power-max: 3.0

  # Final burst when the zone closes — count and power are each randomised per explosion
  finale-explosions-min: 6
  finale-explosions-max: 14
  finale-explosion-power-min: 3.0
  finale-explosion-power-max: 6.0

  # Chance (0.0-1.0) of a lightning strike accompanying each explosion during the fire tick.
  # AWAKENING and INTENSIFYING always 0. Collapse chance also used for the finale burst.
  lightning-chance-critical: 0.3
  lightning-chance-collapse: 0.6

discord:
  # Enable Discord integration
  enabled: true

  announce-open: true
  announce-close: true
